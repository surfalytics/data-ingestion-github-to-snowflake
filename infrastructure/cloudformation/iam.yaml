AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM resources for the surfalytics data ingestion pipeline.
  Creates all managed policies for the ingestion user (S3, Secrets Manager,
  Lambda/ECR/Batch deploy) and the shared execution role trusted by both
  Lambda and Fargate/Batch. Deploy this stack first, before batch.yaml.
  Deploy with: bash infrastructure/scripts/deploy-stack.sh iam

Parameters:
  BucketNamePrefix:
    Type: String
    Default: surfalytics-raw-csv
    Description: Bucket name is ${Prefix}-${AWS::AccountId}.

  IngestionUserName:
    Type: String
    Default: surfalytics-s3-ingestion
    Description: Existing IAM user that receives the managed policies.

  GitHubTokenSecretName:
    Type: String
    Default: surfalytics/data-ingestion/github-token
    Description: Secrets Manager secret name for the GitHub PAT.

  SLSLambdaFunctionName:
    Type: String
    Default: surfalytics-github-ingest-sls-dev
    Description: Lambda function name the Batch Lambda-invoker job will call.

  LambdaEnvironmentKmsKeyId:
    Type: String
    Default: ''
    Description: >
      Optional KMS key ID or ARN (same account/region) used to encrypt the ingest Lambda's
      environment variables. When set, creates a KMS grant so surfalytics-lambda-github-role
      can decrypt. Deployer must have kms:CreateGrant on that key. Leave empty to skip.

Conditions:
  CreateLambdaEnvKmsGrant: !Not [!Equals [!Ref LambdaEnvironmentKmsKeyId, '']]

Resources:

  # ── Ingestion user policies ───────────────────────────────────────────────────
  # Attached to surfalytics-s3-ingestion so the CLI (surfalytics-lab profile)
  # can read/write S3, manage the GitHub token secret, and deploy Lambda/Batch.

  IngestionS3Policy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-s3-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action: s3:ListBucket
            Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
          - Sid: ObjectReadWrite
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}/*'
          - Sid: ListAllBuckets
            Effect: Allow
            Action: s3:ListAllMyBuckets
            Resource: '*'

  IngestionSecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-secrets-manager-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ManageGitHubTokenSecret
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:PutSecretValue
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*'

  IngestionDeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-deploy-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: LambdaDeploy
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:InvokeFunction
              - lambda:ListFunctions
            Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:surfalytics-*'
          - Sid: LambdaLayerRead
            Effect: Allow
            Action: lambda:GetLayerVersion
            Resource: 'arn:aws:lambda:*:*:layer:*'
          - Sid: PassRoleToService
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt ExecutionRole.Arn
          - Sid: CloudWatchLogsRead
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
              - logs:FilterLogEvents
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/surfalytics-*'
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/batch/surfalytics-*'
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/batch/surfalytics-*:*'
          - Sid: ECRGetAuthToken
            Effect: Allow
            Action: ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ECRPushImage
            Effect: Allow
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:PutImage
              - ecr:DescribeRepositories
              - ecr:ListImages
            Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/surfalytics-*'
          - Sid: BatchOperations
            Effect: Allow
            Action:
              - batch:SubmitJob
              - batch:DescribeJobs
              - batch:ListJobs
              - batch:TerminateJob
              - batch:DescribeJobQueues
              - batch:DescribeJobDefinitions
              - batch:DescribeComputeEnvironments
            Resource: '*'
          - Sid: BatchRegisterJobDefinition
            Effect: Allow
            Action:
              - batch:RegisterJobDefinition
              - batch:DeregisterJobDefinition
            Resource: !Sub 'arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-definition/surfalytics-*'
          - Sid: StepFunctionsRun
            Effect: Allow
            Action:
              - states:StartExecution
              - states:DescribeExecution
              - states:GetExecutionHistory
              - states:ListExecutions
              - states:StopExecution
            Resource:
              - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:surfalytics-*'
              - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:surfalytics-*:*'

  # ── Shared execution role (Lambda + Fargate/Batch) ────────────────────────────
  # Assumed at runtime by Lambda functions and Fargate Batch tasks.
  # Trusted by both lambda.amazonaws.com and ecs-tasks.amazonaws.com.

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: surfalytics-lambda-github-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteRawCsv
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}/*'
              - Sid: ListRawCsvBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadGitHubTokenSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*'
        - PolicyName: ECRPull
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuthToken
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRPullImage
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/surfalytics-*'
        - PolicyName: LambdaInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeSLSFunction
                Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${SLSLambdaFunctionName}'
        - PolicyName: KMSDecryptLambdaEnv
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DecryptLambdaEnvVars
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:CreateGrant
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'
      Tags:
        - Key: Purpose
          Value: surfalytics-ingest

  # Grant execution role use of an existing CMK when Lambda env vars are encrypted with it.
  # Avoids hand-editing the key policy if the deployer may kms:CreateGrant on the key.
  LambdaEnvironmentKmsGrant:
    Type: AWS::KMS::Grant
    Condition: CreateLambdaEnvKmsGrant
    Properties:
      KeyId: !Ref LambdaEnvironmentKmsKeyId
      GranteePrincipal: !GetAtt ExecutionRole.Arn
      Operations:
        - Decrypt
        - DescribeKey
        - Encrypt
        - ReEncryptFrom
        - ReEncryptTo
        - GenerateDataKey
        - GenerateDataKeyWithoutPlaintext
        - CreateGrant

Outputs:
  ExecutionRoleArn:
    Description: IAM role ARN assumed by Lambda functions and Fargate/Batch tasks at runtime.
    Value: !GetAtt ExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'

  BucketName:
    Description: S3 bucket name for raw CSV output.
    Value: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  AwsRegion:
    Description: Region this stack was deployed in.
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-AwsRegion'
