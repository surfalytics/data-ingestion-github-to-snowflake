AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Week 2 — Docker.
  Docker uses the same IAM user and permissions as Week 1 — credentials are passed
  as environment variables in the .env file instead of an AWS CLI profile.
  Deploy this stack only if you skipped Week 1; otherwise the Week 1 stack already
  covers the required S3 and Secrets Manager access.
  Deploy with: bash infrastructure/scripts/deploy-stack.sh 02

Parameters:
  BucketNamePrefix:
    Type: String
    Default: surfalytics-raw-csv
    Description: Bucket name is ${Prefix}-${AWS::AccountId}.

  IngestionUserName:
    Type: String
    Default: surfalytics-s3-ingestion
    Description: Existing IAM user that receives the managed policies.

  GitHubTokenSecretName:
    Type: String
    Default: surfalytics/data-ingestion/github-token
    Description: Secrets Manager secret name for the GitHub PAT.

Resources:

  IngestionS3Policy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-s3-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action: s3:ListBucket
            Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
          - Sid: ObjectReadWrite
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}/*'
          - Sid: ListAllBuckets
            Effect: Allow
            Action: s3:ListAllMyBuckets
            Resource: '*'

  IngestionSecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-secrets-manager-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ManageGitHubTokenSecret
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:PutSecretValue
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*'

Outputs:
  BucketName:
    Description: S3 bucket for raw CSV output.
    Value: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketArn:
    Description: S3 bucket ARN.
    Value: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'

  AwsRegion:
    Description: Region this stack was deployed in.
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-AwsRegion'
