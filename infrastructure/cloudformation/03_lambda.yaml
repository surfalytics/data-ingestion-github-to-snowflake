AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Week 3 — AWS Lambda.
  Creates the Lambda execution role (trusted by lambda.amazonaws.com) and attaches
  a managed policy to the ingestion user so it can deploy and invoke the function.
  Requires the ingestion user and S3 bucket to exist (deploy 01 or 02 first).
  Deploy with: bash infrastructure/scripts/deploy-stack.sh 03

Parameters:
  BucketNamePrefix:
    Type: String
    Default: surfalytics-raw-csv
    Description: Bucket name is ${Prefix}-${AWS::AccountId}.

  IngestionUserName:
    Type: String
    Default: surfalytics-s3-ingestion
    Description: Existing IAM user that receives the Lambda deploy managed policy.

  GitHubTokenSecretName:
    Type: String
    Default: surfalytics/data-ingestion/github-token
    Description: Secrets Manager secret name for the GitHub PAT.

Resources:

  # ── Lambda Execution Role ────────────────────────────────────────────────────
  # Assumed by Lambda at runtime — provides S3, Secrets Manager, and CloudWatch access.

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: surfalytics-lambda-github-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteRawCsv
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}/*'
              - Sid: ListRawCsvBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
        - PolicyName: LambdaSecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadGitHubTokenSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*'
      Tags:
        - Key: Purpose
          Value: surfalytics-lambda-github-ingest

  # ── Ingestion user: Lambda deploy permissions ────────────────────────────────
  # Allows the surfalytics-lab CLI user to create/update/invoke the Lambda function.

  IngestionLambdaPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-lambda-deploy'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: LambdaDeploy
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:InvokeFunction
              - lambda:ListFunctions
            Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:surfalytics-*'
          - Sid: LambdaLayerRead
            Effect: Allow
            Action: lambda:GetLayerVersion
            Resource: 'arn:aws:lambda:*:*:layer:*'
          - Sid: PassRoleToLambda
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt LambdaExecutionRole.Arn
          - Sid: CloudWatchLogsRead
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/surfalytics-*'

Outputs:
  LambdaExecutionRoleArn:
    Description: IAM role ARN assumed by the Lambda function at runtime.
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'

  AwsRegion:
    Description: Region this stack was deployed in.
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-AwsRegion'
