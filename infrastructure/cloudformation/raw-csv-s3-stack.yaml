AWSTemplateFormatVersion: '2010-09-09'
Description: >
  S3 bucket for raw CSV plus IAM user (programmatic access) with least-privilege
  S3 policy (ListBucket, PutObject, GetObject). Deploy into the region where you
  want the bucket; that region is the bucket's home region.

Parameters:
  BucketNamePrefix:
    Type: String
    Default: surfalytics-raw-csv
    AllowedPattern: '^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$'
    ConstraintDescription: Lowercase letters, numbers, hyphens; 3–50 chars; start/end alphanumeric.
    Description: >
      Globally unique name is ${Prefix}-${AWS::AccountId} (account ID ensures uniqueness).

  IngestionUserName:
    Type: String
    Default: surfalytics-s3-ingestion
    AllowedPattern: '^[\w+=,.@-]{1,64}$'
    Description: IAM user that receives programmatic keys for uploads.

Resources:
  RawCsvBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Purpose
          Value: raw-csv-ingestion

  IngestionUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref IngestionUserName
      Tags:
        - Key: Purpose
          Value: surfalytics-data-ingestion

  IngestionUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-raw-s3-access'
      Users:
        - !Ref IngestionUser
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !GetAtt RawCsvBucket.Arn
          - Sid: ObjectReadWrite
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub '${RawCsvBucket.Arn}/*'

  IngestionAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref IngestionUser

Outputs:
  BucketName:
    Description: S3 bucket for raw CSV (use with boto3 / AWS CLI).
    Value: !Ref RawCsvBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketArn:
    Description: Bucket ARN.
    Value: !GetAtt RawCsvBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'

  AwsRegion:
    Description: Region this stack (and bucket) was created in.
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-AwsRegion'

  IngestionUserArn:
    Description: IAM user ARN.
    Value: !GetAtt IngestionUser.Arn

  IngestionAccessKeyId:
    Description: Access key ID for the ingestion user (store securely).
    Value: !Ref IngestionAccessKey

  IngestionSecretAccessKey:
    Description: >
      Secret access key (shown once here and in stack outputs; copy to a password
      manager and rotate if exposed).
    Value: !GetAtt IngestionAccessKey.SecretAccessKey
