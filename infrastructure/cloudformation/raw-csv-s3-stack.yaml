AWSTemplateFormatVersion: '2010-09-09'
Description: >
  S3 bucket for raw CSV, IAM policies for the existing ingestion user,
  and Lambda execution role. Deploy with CAPABILITY_NAMED_IAM.

Parameters:
  BucketNamePrefix:
    Type: String
    Default: surfalytics-raw-csv
    AllowedPattern: '^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$'
    ConstraintDescription: Lowercase letters, numbers, hyphens; 3–50 chars; start/end alphanumeric.
    Description: >
      Globally unique bucket name is ${Prefix}-${AWS::AccountId}.

  IngestionUserName:
    Type: String
    Default: surfalytics-s3-ingestion
    AllowedPattern: '^[\w+=,.@-]{1,64}$'
    Description: Existing IAM user that receives policies for S3, Secrets Manager, and Lambda.

  GitHubTokenSecretName:
    Type: String
    Default: surfalytics/data-ingestion/github-token
    Description: Secrets Manager secret name for the GitHub PAT.

  AllowListAllMyBuckets:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      If true, grants s3:ListAllMyBuckets so `aws s3 ls` works without a bucket argument.

Conditions:
  ListAllBucketsEnabled: !Equals [!Ref AllowListAllMyBuckets, 'true']

Resources:

  # ── IAM Policies for existing ingestion user ──────────────────────────────────
  # Note: The S3 bucket already exists outside this stack and is referenced by ARN.

  IngestionUserS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-raw-s3-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action: s3:ListBucket
            Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
          - Sid: ObjectReadWrite
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}/*'

  IngestionListAllBucketsPolicy:
    Type: AWS::IAM::Policy
    Condition: ListAllBucketsEnabled
    Properties:
      PolicyName: !Sub '${AWS::StackName}-list-all-bucket-names'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListAllMyBucketsForCli
            Effect: Allow
            Action: s3:ListAllMyBuckets
            Resource: '*'

  IngestionSecretsManagerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-secrets-manager-access'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ManageGitHubTokenSecret
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:PutSecretValue
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*'

  IngestionLambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-lambda-deploy'
      Users:
        - !Ref IngestionUserName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: LambdaDeploy
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:InvokeFunction
              - lambda:ListFunctions
            Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:surfalytics-*'
          - Sid: PassRoleToLambda
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt LambdaExecutionRole.Arn
          - Sid: CloudWatchLogsRead
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/surfalytics-*'

  # ── Lambda Execution Role ─────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: surfalytics-lambda-github-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteRawCsv
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}/*'
              - Sid: ListRawCsvBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
        - PolicyName: LambdaSecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadGitHubTokenSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GitHubTokenSecretName}-*'
      Tags:
        - Key: Purpose
          Value: surfalytics-lambda-github-ingest

Outputs:
  BucketName:
    Description: S3 bucket for raw CSV.
    Value: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketArn:
    Description: Bucket ARN.
    Value: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'

  AwsRegion:
    Description: Region this stack was deployed in.
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-AwsRegion'

  LambdaExecutionRoleArn:
    Description: IAM role ARN for the Lambda function.
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'
